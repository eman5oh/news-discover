<!-- ical.js parses RFC 5545 calendars including recurrence (RRULE/EXDATE).
     Load from jsdelivr with a fallback to unpkg if it 404s or is blocked. -->
<script>
  (function () {
    const cdns = [
      "https://cdn.jsdelivr.net/npm/ical.js@2/dist/ical.min.js",
      "https://unpkg.com/ical.js@2/dist/ical.min.js",
    ];
    let i = 0;
    (function load() {
      if (i >= cdns.length) { window.__icalLoadFailed = true; return; }
      const s = document.createElement("script");
      s.src = cdns[i++];
      s.async = false; // preserve execution order vs anything appended later
      s.onerror = load;
      document.head.appendChild(s);
    })();
  })();
</script>

const PER_COLUMN_MAX = 18;
const REFRESH_MS = 10 * 60 * 1000; // 10 minutes
const CACHE_VERSION = 2;
const CACHE_MAX_AGE_MS = 6 * 60 * 60 * 1000; // 6 hours — older than that, skip cache

// Tiny localStorage helpers. Failures are silent (private mode, full quota,
// etc.) — caching is best-effort.
function cacheGet(key) {
  try {
    const raw = localStorage.getItem("news:v" + CACHE_VERSION + ":" + key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || (Date.now() - obj.ts) > CACHE_MAX_AGE_MS) return null;
    return obj;
  } catch (_) { return null; }
}
function cacheSet(key, payload) {
  try {
    localStorage.setItem(
      "news:v" + CACHE_VERSION + ":" + key,
      JSON.stringify({ ts: Date.now(), data: payload })
    );
  } catch (_) {}
}

// CORS proxy fallback chain. Tried in order — first one that returns
// usable XML wins. Several is intentional: any single public proxy goes
// down or rate-limits eventually.
const PROXIES = [
  (url) => "https://api.cors.lol/?url=" + encodeURIComponent(url),
  (url) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  (url) => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url),
  (url) => "https://corsproxy.io/?url=" + encodeURIComponent(url),
];

// Sports filter — applied to every column. Matches a sports keyword in the
// title/summary OR a /sports/-style segment in the article URL.
const SPORTS_TEXT_RE = new RegExp(
  "\\b(" + [
    "sports?", "football", "basketball", "baseball", "hockey", "soccer",
    "lacrosse", "tennis", "golf", "wrestling", "gymnastics", "volleyball",
    "softball", "rugby", "cricket", "boxing", "MMA", "UFC", "NASCAR", "F1",
    "athletes?", "athletics?", "athletic",
    "NFL", "NBA", "NHL", "MLB", "MLS", "NCAA", "PGA", "LPGA", "FIFA", "UEFA", "ESPN",
    "olympics?", "olympian", "paralympics?",
    "quarterback", "touchdown", "halftime", "scoreless", "shutout",
    "kickoff", "championships?", "playoffs?", "tournament", "tournaments",
    "head coach", "coaching staff", "season opener", "season finale",
    "cornell big red", "big red sports", "red raiders", "red dragons",
    "ithaca bombers", "syracuse orange"
  ].join("|") + ")\\b",
  "i"
);
const SPORTS_URL_RE = /\/(sports?|football|basketball|baseball|hockey|soccer|athletics?|nfl|nba|nhl|mlb|ncaa|olympics?)(\/|-|$)/i;

function isSports(it) {
  if (it.link && SPORTS_URL_RE.test(it.link)) return true;
  const blob = (it.title || "") + " " + (it.summary || "");
  return SPORTS_TEXT_RE.test(blob);
}

function effectiveTheme() {
  const set = document.documentElement.dataset.theme;
  if (set === "dark" || set === "light") return set;
  return matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
}
function syncThemeButton() {
  // Show the icon for what clicking the button will switch you TO.
  themeBtn.innerHTML = effectiveTheme() === "dark" ? SUN_ICON : MOON_ICON;
}
themeBtn.addEventListener("click", () => {
  const next = effectiveTheme() === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  try { localStorage.setItem("theme", next); } catch (_) {}
  syncThemeButton();
});
// React if the OS theme changes and the user hasn't picked one.
matchMedia("(prefers-color-scheme: dark)").addEventListener?.("change", () => {
  if (!document.documentElement.dataset.theme) syncThemeButton();
});
syncThemeButton();
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && (Date.now() - lastLoadAt) > 60_000) loadAll();
});

let lastLoadAt = 0;

function setStatus(state, msg) {
  statusDot.className = "dot" + (state === "ok" ? "" : " " + state);
  statusText.textContent = msg;
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return "";
  const s = Math.max(1, Math.floor((Date.now() - d.getTime()) / 1000));
  if (s < 60)        return s + "s ago";
  if (s < 3600)      return Math.floor(s / 60) + "m ago";
  if (s < 86_400)    return Math.floor(s / 3600) + "h ago";
  if (s < 7 * 86400) return Math.floor(s / 86_400) + "d ago";
  return d.toLocaleDateString();
}

function stripHtml(html) {
  if (!html) return "";
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  return (tmp.textContent || tmp.innerText || "").replace(/\s+/g, " ").trim();
}

// Try to upgrade a small/thumbnail image URL to a higher-res version.
// Conservative — falls back to the original if the pattern doesn't match.
function upgradeImageUrl(u) {
  if (!u) return u;
  let r = u;
  // WordPress thumbnail suffix: foo-300x200.jpg → foo.jpg (full size)
  r = r.replace(/-(\d{2,4})x(\d{2,4})(\.(?:jpe?g|png|webp|gif))/i, "$3");
  // ?w= / ?width= / ?h= / ?height= — bump small values
  r = r.replace(/([?&](?:w|width))=(\d+)/gi, (m, p, n) =>
    parseInt(n, 10) < 1200 ? p + "=1200" : m);
  r = r.replace(/([?&](?:h|height))=(\d+)/gi, (m, p, n) =>
    parseInt(n, 10) < 800 ? p + "=800" : m);
  // ?resize=300,200 (and the URL-encoded comma variant)
  r = r.replace(/([?&]resize)=(\d+)(?:%2C|,)(\d+)/gi, "$1=1200,800");
  // Thumbor / Vox CDN style: /<W>x<H>/ in the path → bump if small
  r = r.replace(/\/(\d{2,3})x(\d{2,3})\//, (m, w) =>
    parseInt(w, 10) < 800 ? "/1200x800/" : m);
  return r;
}

// Pull the best usable image URL out of an RSS/Atom <item>/<entry>.
// Collects candidates from Media RSS, enclosures, iTunes, and inline <img>
// tags, scores by known width, picks the largest, then upgrades the URL.
function extractImage(it) {
  const candidates = []; // { url, w }

  const norm = (u) => {
    if (!u) return "";
    u = u.trim();
    if (!u) return "";
    if (u.startsWith("//")) u = "https:" + u;
    if (!/^https?:\/\//i.test(u)) return "";
    // Drop trackers / spacers / icons
    if (/\b(?:spacer|pixel|1x1|blank|tracking|beacon|stat\.gif|emoji)\b/i.test(u)) return "";
    return u;
  };

  const guessWidth = (url, attrW) => {
    if (attrW && /^\d+$/.test(attrW)) return parseInt(attrW, 10);
    let m = url.match(/-(\d{2,4})x\d{2,4}\.(?:jpe?g|png|webp|gif)/i);
    if (m) return parseInt(m[1], 10);
    m = url.match(/[?&](?:w|width)=(\d+)/i);
    if (m) return parseInt(m[1], 10);
    m = url.match(/\/(\d{2,4})x\d{2,4}\//);
    if (m) return parseInt(m[1], 10);
    return 0; // unknown
  };

  const add = (rawUrl, attrW) => {
    const u = norm(rawUrl);
    if (!u) return;
    candidates.push({ url: u, w: guessWidth(u, attrW) });
  };

  // <media:content url="..." width="..." type="image/...">
  for (const n of it.getElementsByTagNameNS("*", "content")) {
    const t = (n.getAttribute("type") || "").toLowerCase();
    if (t && !t.startsWith("image/")) continue;
    add(n.getAttribute("url"), n.getAttribute("width"));
  }
  // <media:thumbnail url="..." width="...">
  for (const n of it.getElementsByTagNameNS("*", "thumbnail")) {
    add(n.getAttribute("url"), n.getAttribute("width"));
  }
  // <enclosure url="..." type="image/..." length="...">
  for (const n of it.querySelectorAll("enclosure")) {
    const t = (n.getAttribute("type") || "").toLowerCase();
    const u = n.getAttribute("url") || "";
    if (t.startsWith("image/") || /\.(jpe?g|png|webp|gif)(\?|$)/i.test(u)) {
      add(u, n.getAttribute("width"));
    }
  }
  // <itunes:image href="..."> (rare in news feeds, but cheap to check)
  for (const n of it.getElementsByTagNameNS("*", "image")) {
    add(n.getAttribute("href") || n.getAttribute("url") || n.textContent, null);
  }
  // <img> tags inside description / content:encoded / content / summary
  const htmlBlobs = [
    it.querySelector("description")?.textContent,
    it.getElementsByTagNameNS("*", "encoded")[0]?.textContent,
    it.querySelector("content")?.textContent,
    it.querySelector("summary")?.textContent,
  ].filter(Boolean);
  const imgTagRe = /<img\b[^>]*>/gi;
  for (const html of htmlBlobs) {
    const tags = html.match(imgTagRe) || [];
    for (const tag of tags) {
      const srcM = tag.match(/\bsrc=["']([^"']+)["']/i);
      if (!srcM) continue;
      const wM = tag.match(/\bwidth=["']?(\d+)/i);
      add(srcM[1], wM ? wM[1] : null);
    }
  }

  if (candidates.length === 0) return "";

  // Sort: largest known width first; unknown widths come after known widths
  // ≥ 400, but before known small ones.
  candidates.sort((a, b) => {
    const sa = a.w || 250; // unknown ≈ "probably medium"
    const sb = b.w || 250;
    return sb - sa;
  });

  return upgradeImageUrl(candidates[0].url);
}

function parseFeed(xmlText, sourceName) {
  const doc = new DOMParser().parseFromString(xmlText, "application/xml");
  if (doc.querySelector("parsererror")) return [];
  const items = [];

  // RSS 2.0
  doc.querySelectorAll("channel > item").forEach((it) => {
    items.push({
      title:   it.querySelector("title")?.textContent?.trim() || "(untitled)",
      link:    it.querySelector("link")?.textContent?.trim()
            || it.querySelector("guid")?.textContent?.trim()
            || "#",
      date:    it.querySelector("pubDate")?.textContent
            || it.querySelector("dc\\:date")?.textContent
            || "",
      summary: stripHtml(
                 it.querySelector("description")?.textContent
              || it.getElementsByTagNameNS("*", "encoded")[0]?.textContent
              || ""
               ).slice(0, 260),
      image:   extractImage(it),
      source:  sourceName,
    });
  });

  // Atom
  if (items.length === 0) {
    doc.querySelectorAll("entry").forEach((it) => {
      const linkEl = it.querySelector("link[rel='alternate'], link");
      items.push({
        title:   it.querySelector("title")?.textContent?.trim() || "(untitled)",
        link:    linkEl?.getAttribute("href") || "#",
        date:    it.querySelector("updated")?.textContent
              || it.querySelector("published")?.textContent
              || "",
        summary: stripHtml(
                   it.querySelector("summary")?.textContent
                || it.querySelector("content")?.textContent
                || ""
                 ).slice(0, 260),
        image:   extractImage(it),
        source:  sourceName,
      });
    });
  }

  return items;
}

// Single proxy attempt with its own abort.
function fetchViaProxy(proxyFn, feed, timeoutMs) {
  const ac = new AbortController();
  const timer = setTimeout(() => ac.abort(), timeoutMs);
  return fetch(proxyFn(feed.url), { cache: "no-store", signal: ac.signal })
    .then(r => {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(t => {
      const items = parseFeed(t, feed.name);
      if (items.length === 0) throw new Error("empty");
      return items;
    })
    .finally(() => clearTimeout(timer));
}

// Hedge the primary proxy: kick off proxy[0] immediately, and if it
// hasn't replied in 1.5s, race proxy[1] alongside it. First success
// wins. If both fail, fall back to the rest of the chain serially.
// 8s per-attempt timeout keeps slow failures from stalling the page.
async function fetchFeed(feed) {
  const HEDGE_DELAY_MS = 1500;
  const TIMEOUT_MS = 8000;

  const primary = fetchViaProxy(PROXIES[0], feed, TIMEOUT_MS);
  const hedged = new Promise((resolve, reject) => {
    setTimeout(() => {
      fetchViaProxy(PROXIES[1], feed, TIMEOUT_MS).then(resolve, reject);
    }, HEDGE_DELAY_MS);
  });

  try {
    return await Promise.any([primary, hedged]);
  } catch (_) {
    let lastErr = null;
    for (const proxy of PROXIES.slice(2)) {
      try { return await fetchViaProxy(proxy, feed, TIMEOUT_MS); }
      catch (e) { lastErr = e; }
    }
    throw new Error(feed.name + ": " + (lastErr ? lastErr.message : "all proxies failed"));
  }
}

function renderColumnItems(category, items) {
  const col = document.getElementById("col-" + category);
  const list = col.querySelector("[data-list]");
  const countEl = col.querySelector("[data-count]");
  countEl.textContent = items.length ? items.length + " stories" : "No items";
  list.innerHTML = items.length
    ? items.map(cardHtml).join("")
    : '<div class="empty">No headlines loaded right now. Try refreshing in a minute.</div>';
  list.dataset.loadedOnce = "1";
}

// Paint cached items immediately on first paint so the page is usable
// before any network request resolves. The live fetch will replace this
// when fresh data arrives.
function paintCachedColumns() {
  for (const cat of ["local", "national", "tech"]) {
    const cached = cacheGet("col:" + cat);
    if (cached && Array.isArray(cached.data) && cached.data.length) {
      renderColumnItems(cat, cached.data);
    }
  }
}

async function loadColumn(category) {
  const col = document.getElementById("col-" + category);
  const list = col.querySelector("[data-list]");

  // Skeletons only when we have nothing on screen yet (no cache, no prior load).
  if (!list.dataset.loadedOnce) {
    list.innerHTML = Array.from({ length: 5 })
      .map(() => '<div class="skeleton"></div>').join("");
  }

  const results = await Promise.allSettled(FEEDS[category].map(fetchFeed));
  const items = [];
  const failedSources = [];

  results.forEach((r, i) => {
    if (r.status === "fulfilled") items.push(...r.value);
    else failedSources.push(FEEDS[category][i].name);
  });

  // Drop sports stories from every column.
  const noSports = items.filter(it => !isSports(it));

  // Sort newest first; items with bad/no date sink to bottom
  noSports.sort((a, b) => {
    const ta = new Date(a.date).getTime() || 0;
    const tb = new Date(b.date).getTime() || 0;
    return tb - ta;
  });

  // Dedupe by normalized title
  const seen = new Set();
  const unique = [];
  for (const it of noSports) {
    const key = (it.title || "").toLowerCase().replace(/\s+/g, " ").trim();
    if (key && !seen.has(key)) { seen.add(key); unique.push(it); }
  }

  const top = unique.slice(0, PER_COLUMN_MAX);
  renderColumnItems(category, top);

  // Persist the rendered items so the next page load is instant.
  if (top.length) cacheSet("col:" + category, top);

  if (failedSources.length) {
    const list2 = document.querySelector("#col-" + category + " [data-list]");
    const note = document.createElement("div");
    note.className = "errbox";
    note.textContent = "Couldn't reach: " + failedSources.join(", ");
    list2.appendChild(note);
  }

  return { ok: results.some(r => r.status === "fulfilled"), failed: failedSources.length };
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function cardHtml(it) {
  // If the image fails to load, hide it so the card stays clean.
  const img = it.image
    ? `<img class="thumb" src="${escapeHtml(it.image)}" alt="" loading="lazy"
            decoding="async" referrerpolicy="no-referrer"
            onerror="this.remove()">`
    : "";
  return `
    <a class="card" href="${escapeHtml(it.link)}" target="_blank" rel="noopener noreferrer">
      ${img}
      <div class="body">
        <div class="title">${escapeHtml(it.title)}</div>
        ${it.summary ? `<div class="snippet">${escapeHtml(it.summary)}</div>` : ""}
        <div class="row">
          <span class="pill">${escapeHtml(it.source)}</span>
          <span>${escapeHtml(timeAgo(it.date))}</span>
        </div>
      </div>
    </a>`;
}

async function loadAll(manual = false) {
  setStatus("ok", manual ? "Refreshing…" : "Updating…");
  refreshBtn.disabled = true;

  const results = await Promise.all([
    loadColumn("local"),
    loadColumn("national"),
    loadColumn("tech"),
  ]);

  lastLoadAt = Date.now();
  refreshBtn.disabled = false;

  const anyOk     = results.some(r => r.ok);
  const anyFailed = results.some(r => r.failed);
  const stamp = new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });

  if (!anyOk)        setStatus("error", "Offline · last tried " + stamp);
  else if (anyFailed) setStatus("stale", "Updated " + stamp + " · some sources unreachable");
  else                setStatus("ok",    "Live · updated " + stamp);
}

// Paint anything we cached last time before kicking off the network fetch.
paintCachedColumns();
loadAll();
setInterval(loadAll, REFRESH_MS);

/* ---- Weather (Open-Meteo, no API key) -------------------------- */
const LOCATIONS = [
  { id: "cortland", name: "Cortland, NY", lat: 42.6012, lon: -76.1805 },
  { id: "ithaca",   name: "Ithaca, NY",   lat: 42.4440, lon: -76.5019 },
];
const WEATHER_REFRESH_MS = 15 * 60 * 1000; // 15 minutes

function weatherUrl(loc) {
  return "https://api.open-meteo.com/v1/forecast" +
    "?latitude=" + loc.lat + "&longitude=" + loc.lon +
    "&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,apparent_temperature" +
    "&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max" +
    "&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch" +
    "&timezone=America/New_York&forecast_days=5";
}

// WMO weather code → { label, emoji }. Day icons; close enough at night.
function wmo(code) {
  const m = {
    0:  ["Clear",            "☀️"],
    1:  ["Mostly clear",     "🌤️"],
    2:  ["Partly cloudy",    "⛅"],
    3:  ["Overcast",         "☁️"],
    45: ["Fog",              "🌫️"],
    48: ["Freezing fog",     "🌫️"],
    51: ["Light drizzle",    "🌦️"],
    53: ["Drizzle",          "🌦️"],
    55: ["Heavy drizzle",    "🌧️"],
    56: ["Freezing drizzle", "🌧️"],
    57: ["Freezing drizzle", "🌧️"],
    61: ["Light rain",       "🌦️"],
    63: ["Rain",             "🌧️"],
    65: ["Heavy rain",       "🌧️"],
    66: ["Freezing rain",    "🌧️"],
    67: ["Freezing rain",    "🌧️"],
    71: ["Light snow",       "🌨️"],
    73: ["Snow",             "🌨️"],
    75: ["Heavy snow",       "❄️"],
    77: ["Snow grains",      "🌨️"],
    80: ["Rain showers",     "🌦️"],
    81: ["Rain showers",     "🌧️"],
    82: ["Heavy showers",    "⛈️"],
    85: ["Snow showers",     "🌨️"],
    86: ["Snow showers",     "❄️"],
    95: ["Thunderstorm",     "⛈️"],
    96: ["T-storm w/ hail",  "⛈️"],
    99: ["T-storm w/ hail",  "⛈️"],
  };
  return m[code] || ["—", "·"];
}

function dayLabel(isoDate, idx) {
  if (idx === 0) return "Today";
  const d = new Date(isoDate + "T12:00:00");
  return d.toLocaleDateString(undefined, { weekday: "short" });
}

function renderWeather(loc, data) {
  const card = document.getElementById("wx-" + loc.id);
  if (!card) return;
  const cur = data.current, day = data.daily;
  const [curLabel, curIcon] = wmo(cur.weather_code);

  const forecastHtml = day.time.map((iso, i) => {
    const [label, ic] = wmo(day.weather_code[i]);
    const hi = Math.round(day.temperature_2m_max[i]);
    const lo = Math.round(day.temperature_2m_min[i]);
    const pop = day.precipitation_probability_max[i];
    const popTxt = (pop != null && pop >= 20) ? " · " + pop + "% precip" : "";
    return `
      <div class="weather-day" title="${escapeHtml(label + popTxt)}">
        <div class="d">${escapeHtml(dayLabel(iso, i))}</div>
        <div class="i">${ic}</div>
        <div class="t"><b>${hi}°</b> <span style="color:var(--muted)">${lo}°</span></div>
      </div>`;
  }).join("");

  card.innerHTML = `
    <div class="weather-now">
      <div class="weather-icon">${curIcon}</div>
      <div>
        <div class="weather-loc">${escapeHtml(loc.name)}</div>
        <div style="display:flex;align-items:baseline;gap:10px;">
          <div class="weather-temp">${Math.round(cur.temperature_2m)}°F</div>
          <div class="weather-meta">${escapeHtml(curLabel)}</div>
        </div>
        <div class="weather-meta">
          Feels <b>${Math.round(cur.apparent_temperature)}°</b> ·
          Wind <b>${Math.round(cur.wind_speed_10m)} mph</b> ·
          Humidity <b>${cur.relative_humidity_2m}%</b>
        </div>
      </div>
    </div>
    <div class="weather-divider"></div>
    <div class="weather-forecast">${forecastHtml}</div>
  `;
}

// Paint cached weather (≤ 1 hr old) on first load, before the network call.
function paintCachedWeather() {
  for (const loc of LOCATIONS) {
    const cached = cacheGet("wx:" + loc.id);
    if (cached && cached.data && (Date.now() - cached.ts) < 60 * 60 * 1000) {
      renderWeather(loc, cached.data);
    }
  }
}

async function loadWeatherFor(loc) {
  const card = document.getElementById("wx-" + loc.id);
  if (!card) return;
  try {
    const res = await fetch(weatherUrl(loc), { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    cacheSet("wx:" + loc.id, data);
    renderWeather(loc, data);
  } catch (e) {
    card.innerHTML =
      `<div class="weather-error">${escapeHtml(loc.name)} weather unavailable (${escapeHtml(e.message || "error")})</div>`;
  }
}

function loadAllWeather() {
  LOCATIONS.forEach(loadWeatherFor);
}

paintCachedWeather();
loadAllWeather();
setInterval(loadAllWeather, WEATHER_REFRESH_MS);

/* ---- Calendar: "Today at a glance" (Google iCal, no OAuth) ----- */
const CAL_URL_KEY     = "cal:v1:url";
const CAL_CACHE_KEY   = "cal:v1:ics";
const CAL_REFRESH_MS  = 5 * 60 * 1000;   // 5 minutes
const CAL_CACHE_TTL_MS = 30 * 60 * 1000; // accept cached ICS up to 30 min old
const calCard = $("#cal-card");

function getCalUrl() {
  try { return (localStorage.getItem(CAL_URL_KEY) || "").trim(); } catch (_) { return ""; }
}
function setCalUrl(u) {
  try {
    if (u) localStorage.setItem(CAL_URL_KEY, u);
    else   localStorage.removeItem(CAL_URL_KEY);
  } catch (_) {}
}
function normalizeCalUrl(u) {
  u = (u || "").trim();
  if (u.startsWith("webcal://")) u = "https://" + u.slice(9);
  return u;
}

function renderCalSetup(prefill) {
  calCard.innerHTML = `
    <div class="cal-setup">
      <h3>Connect your Google Calendar</h3>
      <p>Paste your <b>Secret address in iCal format</b> below. It's stored only in this browser — not in the repo or on any server.</p>
      <div class="cal-setup-form">
        <input id="cal-input" type="url" placeholder="https://calendar.google.com/calendar/ical/…/basic.ics"
               value="${escapeHtml(prefill || "")}" autocomplete="off" spellcheck="false">
        <button id="cal-save">Connect</button>
      </div>
      <details>
        <summary>How do I find this URL?</summary>
        <ol>
          <li>Open <a href="https://calendar.google.com" target="_blank" rel="noopener">Google Calendar</a> in a browser.</li>
          <li>Click the gear (top right) → <b>Settings</b>.</li>
          <li>In the left sidebar, under <b>Settings for my calendars</b>, click your calendar.</li>
          <li>Scroll down to <b>Integrate calendar</b>.</li>
          <li>Copy <b>Secret address in iCal format</b> (not "Public address").</li>
          <li>Paste it above and click <b>Connect</b>.</li>
        </ol>
      </details>
    </div>`;
  $("#cal-save").addEventListener("click", saveCalFromInput);
  $("#cal-input").addEventListener("keydown", (e) => {

  });
}

function saveCalFromInput() {
  const raw = $("#cal-input").value;
  const u = normalizeCalUrl(raw);
  if (!/^https?:\/\//i.test(u)) {
    alert("That doesn't look like a calendar URL. It should start with https:// or webcal://");
    return;
  }
  setCalUrl(u);
  try { localStorage.removeItem(CAL_CACHE_KEY); } catch (_) {}
  calCard.innerHTML = '<div class="cal-empty">Loading calendar…</div>';
  loadCalendar();
}

async function fetchIcs(url) {
  // Google's iCal endpoint sometimes serves CORS, sometimes not. Try direct
  // first (fast path), then fall back to the proxy chain.
  try {
    const r = await fetch(url, { cache: "no-store" });
    if (r.ok) {
      const t = await r.text();
      if (t.includes("BEGIN:VCALENDAR")) return t;
    }
  } catch (_) { /* CORS or network — try proxies */ }

  // ICS-specific proxy order. codetabs leads because it accepts longer
  // URLs and bigger response bodies than cors.lol (which returns 413 for
  // Google iCal URLs above a fairly short threshold). AllOrigins second
  // for breadth, then the rest as fallbacks.
  const ICS_PROXIES = [
    { name: "codetabs",     fn: (u) => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u) },
    { name: "allorigins",   fn: (u) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u) },
    { name: "allorigins-g", fn: (u) => "https://api.allorigins.win/get?url=" + encodeURIComponent(u) + "&disableCache=true" },
    { name: "cors.lol",     fn: (u) => "https://api.cors.lol/?url=" + encodeURIComponent(u) },
    { name: "corsproxy.io", fn: (u) => "https://corsproxy.io/?url=" + encodeURIComponent(u) },
  ];

  // Recognise an ICS file via any of its required markers. Some proxies
  // wrap responses in HTML — try to extract the inner text in that case.
  const looksLikeIcs = (s) => /BEGIN:VCALENDAR|^PRODID:|BEGIN:VEVENT/im.test(s.slice(0, 8000));
  const unwrapIfHtml = (s) => {
    if (!/^\s*</.test(s)) return s;
    // Strip tags & decode the common entities. ICS markers are plain ASCII
    // so we only need this rough cleanup to find them.
    const stripped = s.replace(/<[^>]+>/g, " ")
                       .replace(/&lt;/g, "<").replace(/&gt;/g, ">")
                       .replace(/&amp;/g, "&").replace(/&quot;/g, '"')
                       .replace(/&#(\d+);/g, (_, n) => String.fromCharCode(+n));
    return looksLikeIcs(stripped) ? stripped : s;
  };

  const attempts = [];
  for (const p of ICS_PROXIES) {
    try {
      const ac = new AbortController();
      const timer = setTimeout(() => ac.abort(), 12_000);
      const r = await fetch(p.fn(url), { cache: "no-store", signal: ac.signal });
      clearTimeout(timer);
      if (!r.ok) { attempts.push(p.name + " " + r.status); continue; }
      let t = await r.text();
      // allorigins /get wraps the body in JSON
      if (p.name === "allorigins-g") {
        try { t = JSON.parse(t).contents || ""; } catch (_) { t = ""; }
      }
      const candidate = unwrapIfHtml(t);
      if (looksLikeIcs(candidate)) return candidate;
      const head = t.slice(0, 80).replace(/\s+/g, " ").trim();
      const tag = /^\s*</.test(t) ? "HTML" : "not ICS";
      attempts.push(p.name + ' (' + tag + ', ' + t.length + 'b, "' + head + '")');
    } catch (e) {
      attempts.push(p.name + " " + (e.name === "AbortError" ? "timeout" : (e.message || "error")));
    }
  }
  throw new Error("Tried: " + attempts.join(" · "));
}

// Poll for ical.js to finish loading. Resolves once `ICAL` is defined,
// or rejects after ~10s of waiting (or if the loader marked failure).
function waitForIcal() {
  return new Promise((resolve, reject) => {
    if (typeof ICAL !== "undefined") return resolve();
    if (window.__icalLoadFailed) return reject(new Error("ical.js failed to load (CDN unreachable — ad blocker?)"));
    let waited = 0;
    const i = setInterval(() => {
      if (typeof ICAL !== "undefined") { clearInterval(i); resolve(); return; }
      if (window.__icalLoadFailed) { clearInterval(i); reject(new Error("ical.js failed to load (CDN unreachable — ad blocker?)")); return; }
      if ((waited += 100) > 10_000) { clearInterval(i); reject(new Error("ical.js load timed out")); }
    }, 100);
  });
}

// Parse the VCALENDAR string and return events overlapping today (local TZ),
// including recurring events expanded via ical.js.
function eventsForToday(icsText) {
  if (typeof ICAL === "undefined") throw new Error("ical.js not loaded");

  const startOfDay = new Date(); startOfDay.setHours(0, 0, 0, 0);
  const endOfDay   = new Date(startOfDay); endOfDay.setDate(endOfDay.getDate() + 1);

  const startICAL = ICAL.Time.fromJSDate(startOfDay, false);
  const endICAL   = ICAL.Time.fromJSDate(endOfDay, false);

  const jcal = ICAL.parse(icsText);
  const comp = new ICAL.Component(jcal);
  const vevents = comp.getAllSubcomponents("vevent");

  const out = [];
  for (const ve of vevents) {
    let event;
    try { event = new ICAL.Event(ve); } catch (_) { continue; }
    if (!event.summary) continue;

    if (event.isRecurring()) {
      let iter;
      try { iter = event.iterator(); } catch (_) { continue; }
      let n, safety = 0;
      while ((n = iter.next()) && safety++ < 366) {
        if (n.compare(endICAL) >= 0) break;
        let occ;
        try { occ = event.getOccurrenceDetails(n); } catch (_) { continue; }
        const s = occ.startDate.toJSDate();
        const e = occ.endDate.toJSDate();
        if (e <= startOfDay) continue;
        if (s >= endOfDay)   break;
        out.push({
          start:  s,
          end:    e,
          title:  occ.item.summary || event.summary,
          allDay: occ.startDate.isDate,
        });
      }
    } else {
      const s = event.startDate.toJSDate();
      const e = event.endDate ? event.endDate.toJSDate() : new Date(s.getTime() + 30 * 60_000);
      if (e <= startOfDay) continue;
      if (s >= endOfDay)   continue;
      out.push({
        start:  s,
        end:    e,
        title:  event.summary,
        allDay: event.startDate.isDate,
      });
    }
  }

  // All-day first, then chronological.
  out.sort((a, b) => {
    if (a.allDay !== b.allDay) return a.allDay ? -1 : 1;
    return a.start - b.start;
  });
  return out;
}

function fmtTime(d) {
  return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })
          .replace(":00", "").toLowerCase().replace(/\s/g, "");
}
function timeLabel(ev) {
  if (ev.allDay) return "All day";
  const a = fmtTime(ev.start);
  // Show just start; end optional. Keep it terse for the at-a-glance view.
  return a;
}

function renderCalEvents(events) {
  const now = new Date();
  const dateLabel = now.toLocaleDateString(undefined, {
    weekday: "long", month: "short", day: "numeric"
  });

  const rows = events.length === 0
    ? '<div class="cal-empty">Nothing on your calendar today 🎉</div>'
    : '<div class="cal-events">' + events.map(ev => {
        const isNow = !ev.allDay && now >= ev.start && now < ev.end;
        return `
          <div class="cal-event${isNow ? " now" : ""}">
            <div class="cal-time">${escapeHtml(timeLabel(ev))}</div>
            <div class="cal-event-title">${escapeHtml(ev.title)}</div>
          </div>`;
      }).join("") + '</div>';

  calCard.innerHTML = `
    <div class="cal-head">
      <div class="cal-title">Today <span class="date">· ${escapeHtml(dateLabel)}</span></div>
      <div class="cal-actions">
        <button id="cal-refresh" title="Refresh">↻</button>
        <button id="cal-disconnect" title="Change calendar">Change</button>
      </div>
    </div>
    ${rows}`;
  $("#cal-refresh").addEventListener("click", () => loadCalendar(true));
  $("#cal-disconnect").addEventListener("click", () => {
    if (!confirm("Disconnect your calendar?")) return;
    setCalUrl("");
    try { localStorage.removeItem(CAL_CACHE_KEY); } catch (_) {}
    renderCalSetup();
  });
}

function renderCalError(msg) {
  calCard.innerHTML = `
    <div class="cal-head">
      <div class="cal-title">Today</div>
      <div class="cal-actions">
        <button id="cal-retry">Retry</button>
        <button id="cal-disconnect">Change</button>
      </div>
    </div>
    <div class="cal-empty">Couldn't load your calendar.</div>
    <details style="margin-top:8px;">
      <summary style="cursor:pointer;color:var(--muted);font-size:12px;">Show details</summary>
      <div style="margin-top:6px;color:var(--muted);font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace;word-break:break-all;">
        ${escapeHtml(msg)}
      </div>
    </details>`;
  $("#cal-retry").addEventListener("click", () => loadCalendar(true));
  $("#cal-disconnect").addEventListener("click", () => {
    setCalUrl(""); try { localStorage.removeItem(CAL_CACHE_KEY); } catch (_) {}
    renderCalSetup();
  });
}

async function loadCalendar(force) {
  const url = getCalUrl();
  if (!url) { renderCalSetup(); return; }

  // Make sure ical.js is actually loaded before we try to use it.
  try { await waitForIcal(); }
  catch (e) { renderCalError(e.message); return; }

  // Paint cached ICS immediately if we have a recent copy.
  if (!force) {
    const cached = cacheGet(CAL_CACHE_KEY);
    if (cached && cached.data && (Date.now() - cached.ts) < CAL_CACHE_TTL_MS) {
      try { renderCalEvents(eventsForToday(cached.data)); }
      catch (e) { /* fall through to fresh fetch */ }
    }
  }

  try {
    const text = await fetchIcs(url);
    cacheSet(CAL_CACHE_KEY, text);
    renderCalEvents(eventsForToday(text));
  } catch (e) {
    // If we already painted from cache, leave it; otherwise show error.
    if (!calCard.querySelector(".cal-events") && !calCard.querySelector(".cal-empty")?.textContent?.includes("Nothing")) {
      renderCalError(e.message || String(e));
    }
  }
}

// Wait for the deferred ical.js to be ready, then start.
window.addEventListener("DOMContentLoaded", () => {
  loadCalendar();
  setInterval(loadCalendar, CAL_REFRESH_MS);
});
</script>
